theme = "custom_term16"
[editor]
# rainbow-brackets=true
middle-click-paste=false
line-number="relative"
color-modes=true
trim-trailing-whitespace=true
popup-border="all"
indent-heuristic="hybrid"
end-of-line-diagnostics = "hint"
bufferline="always"
[editor.lsp]
auto-signature-help = true
display-inlay-hints = true
# [editor.cursor-shape]
# normal="block"
# insert="bar"
# select="underline"
[editor.indent-guides]
render = true
character = "┆" # Some characters that work well: "▏", "┆", "┊", "⸽"
skip-levels = 1
[editor.inline-diagnostics]
cursor-line="error"
[editor.soft-wrap]
# enable=true
# other-lines="hint"
[keys.insert]
S-tab = "unindent"
[keys.normal]
F5=":sh sh -lc 'timeout 60s cargo run -q  1>&2'"
F6=":sh sh -lc 'timeout 60s zig build run 1>&2'"
# F4=':run-shell-command sh -lc "cd %{workspace_directory} && git diff --no-ext-diff --unified=0 -- %{file_path_absolute} | sed -n '\''/^[+-]/p'\'' | grep -vE '\''^(---|\\+\\+\\+)$'\'' | sed '\''s/^-/OLD: /; s/^+/NEW: /'\''"'
pageup = "goto_line_start"
pagedown = "goto_line_end"
C-h = "jump_view_left"
C-l = "jump_view_right"
C-j = "jump_view_down"
C-k = "jump_view_up"
